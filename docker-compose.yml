version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: event_backend
    restart: always
    # Exposing the API directly for local/staging use without NGINX for simplicity
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-event_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - event-system-network

  mysql:
    image: mysql:8.0
    container_name: event_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-supersecret}
      MYSQL_DATABASE: ${DB_NAME:-event_db}
    volumes:
      - mysql_data:/var/lib/mysql
    # Expose only internally to the Docker network. No host mapping prevents public exposure.
    ports:
      - "3306"
    networks:
      - event-system-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-supersecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: event_redis
    restart: always
    # Enforce AOF (Append Only File) for maximum data durability across restarts
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Expose only internally to the Docker network
    ports:
      - "6379"
    networks:
      - event-system-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  event-system-network:
    driver: bridge
    name: event-system-network

volumes:
  mysql_data:
    name: event_mysql_data
  redis_data:
    name: event_redis_data
