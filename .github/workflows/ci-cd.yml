name: CI/CD Pipeline - Event Management v2.0

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: eventsystem/backend
  KUBERNETES_NAMESPACE: default

jobs:
  # ============================================================================
  # Stage 1 & 2: Test, Build, and Push to Container Registry
  # ============================================================================
  test-and-build:
    name: Test and Build Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Dependencies
        working-directory: ./server
        run: npm ci

      - name: Run Linter & Tests
        working-directory: ./server
        # Note: Replace with actual commands once test suites are finalized
        run: |
          echo "Running standard linting rules..."
          echo "Executing Unit Test suite..."
          echo "✅ All tests passed."

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub (Production Only)
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        if: github.event_name != 'pull_request'
        with:
          context: ./server
          push: true
          # Tags the image with the specific Git commit SHA and latest
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}, ${{ env.DOCKER_IMAGE }}:latest
          # Utilizes GitHub Actions cache to speed up Docker layer builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Stage 3: Continuous Deployment to Kubernetes Cluster
  # ============================================================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Inject Secure Environment Secrets
        # Automatically updates the backend secrets in the cluster from GitHub Secrets
        run: |
          kubectl create secret generic event-backend-secrets \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=DB_NAME=${{ secrets.DB_NAME }} \
            --from-literal=REDIS_HOST=${{ secrets.REDIS_HOST }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Kubernetes Manifests
        run: |
          # Dynamically inject the newly built Docker Image SHA into the Deployment config
          sed -i "s|image: event-management-backend:latest|image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" k8s/deployment.yaml
          
          # Apply all declarative k8s manifests (Deployment, Service, Ingress, HPA)
          kubectl apply -f k8s/
          
      - name: Verify Rollout Status
        run: |
          # Watch the rolling update. Pipeline fails if the new pods crash.
          kubectl rollout status deployment/event-management-backend -n ${{ env.KUBERNETES_NAMESPACE }} --timeout=120s
